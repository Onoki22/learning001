<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student</title>
</head>
<body>
    <form action="thanks" method="post">
     <label for="First Name">Your First Name</label><br>
     <input type="text" name="fullname" id="fullname" placeholder="First Name" required>
                     <br>
     <label for="Last Name">Your last name</label><br>
     <input type="text" name="lastname" id="lastname" placeholder="Last Name" required>
                     <br>
     <label for="Date of Birth">Your date of birth</label><br>
     <input type="date" name="Date of Birth" id="Date of Birth" required>
                     <br>
     <label for="photo">Upload picture</label><br>
     <input type="file" name="photo" id="photo">
                    <br>
     <label for="gender">Gender</label><br>
     <input type="radio" name="gender" id="gender" value="female"> female
     <input type="radio" name="gender" value="male" id="gender"> male
                    <br>
     <label for="Admission Status">Admission Status</label><br>
     <input type="search" name="Admission Status" id="Admission Status" placeholder="search admisson status">
                    <br>
     <label for="Phone Number">Phone number</label><br>
     <input type="number" name="phone number" id="phone number" required>
                    <br>
     <label for="email">Your Email</label><br>
     <input type="email" name="email" id="email" placeholder="Email" required>
                    <br>
     <select name="state">
            <option value="Lagos">Lagos</option>
            <option value="Ogun">Ogun</option>
            <option value="Ibadan">Ibadan</option>
            <option value="Edo">Edo</option>
                <option value="select one options" selected>slect one options </option>
        </select> 
                    <br>
     <label for="Parent/Gurdaian Name">Your Gurdaian Name</label><br>
     <input type="text" name="Parent/Gurdaian Name" id="Parent/Gurdaian Name" required>
                    <br>
     <label for="Adress">Your Adress</label><br>
     <input type="text" name="Adress" id="Adress" required>
                    <br>
     <label for="Address of Parent/Gurdaian (if different from above)">Your Address of Parent/Gurdaian(if different from above)</label><br>
     <input type="text" name="Adaress of Parent/Gurdaian (if different from above)" id="Address of Parent/Gurdaian (if different from above)">
                    <br>
     <label for="Emergency Contact(If different)">Emergency Contact(If different)</label><br>
     <input type="text" name="Emergency Contact(If different)" id="Emergency Contact(If different)">
                    <br>
       <button type="submit">Submit</button>
                    
    </form>
    
</body>
</html>
